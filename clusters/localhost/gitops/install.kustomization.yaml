apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mb-install
  namespace: wac-hospital
spec:
  wait: true
  force: true
  dependsOn:
    - name: mb-prepare
  interval: 120s
  path: clusters/localhost/install
  prune: true
  sourceRef:
    kind: GitRepository
    name: mb-gitops-repo
