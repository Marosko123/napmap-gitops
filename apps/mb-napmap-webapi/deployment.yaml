apiVersion: apps/v1
kind: Deployment
metadata:
  name: mb-napmap-webapi-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: mb-napmap-webapi-label
  template:
    metadata:
      labels:
        pod: mb-napmap-webapi-label
    spec:
      volumes:
      - name: init-scripts
        configMap:
          name: mb-napmap-webapi-mongodb-init
      initContainers:
      - name: init-mongodb
        image: mongo:latest
        imagePullPolicy: Always
        command: ['mongosh', "--nodb", '-f', '/scripts/init-db.js']
        volumeMounts:
        - name: init-scripts
          mountPath: /scripts
        env:
          - name: NAPMAP_API_MONGODB_HOST
            valueFrom:
              configMapKeyRef:
                name: mongodb-connection
                key: host
          - name: NAPMAP_API_MONGODB_PORT
            valueFrom:
              configMapKeyRef:
                name: mongodb-connection
                key: port
          - name: NAPMAP_API_MONGODB_USERNAME
            valueFrom:
              secretKeyRef:
                name: mongodb-auth
                key: username
          - name: NAPMAP_API_MONGODB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongodb-auth
                key: password
          - name: NAPMAP_API_MONGODB_DATABASE
            value: mb-napmap
          - name: NAPMAP_API_MONGODB_COLLECTION
            value: stations
          - name: RETRY_CONNECTION_SECONDS
            value: "5"
        resources:
          requests:
            memory: "128Mi"
            cpu: "0.01"
          limits:
            memory: "256Mi"
            cpu: "0.1"
      containers:
      - name: mb-napmap-webapi-container
        image: bednarmaros341/napmap-webapi
        imagePullPolicy: Always
        ports:
        - name: webapi-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        env:
          - name: NAPMAP_API_ENVIRONMENT
            value: production
          - name: NAPMAP_API_PORT
            value: "8080"
          - name: NAPMAP_API_MONGODB_HOST
            valueFrom:
              configMapKeyRef:
                name: mongodb-connection
                key: host
          - name: NAPMAP_API_MONGODB_PORT
            valueFrom:
              configMapKeyRef:
                name: mongodb-connection
                key: port
          - name: NAPMAP_API_MONGODB_USERNAME
            valueFrom:
              secretKeyRef:
                name: mongodb-auth
                key: username
          - name: NAPMAP_API_MONGODB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongodb-auth
                key: password
          - name: NAPMAP_API_MONGODB_DATABASE
            value: mb-napmap
          - name: NAPMAP_API_MONGODB_COLLECTION
            value: stations
          - name: NAPMAP_API_MONGODB_TIMEOUT_SECONDS
            value: "5"
        resources:
          requests:
            memory: "64Mi"
            cpu: "0.01"
          limits:
            memory: "512Mi"
            cpu: "0.3"
