apiVersion: apps/v1
kind: Deployment
metadata:
  name: mb-napmap-ufe-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      pod: mb-napmap-ufe-label
  template:
    metadata:
      labels:
        pod: mb-napmap-ufe-label
    spec:
      containers:
        - name: mb-napmap-ufe-container
          image: bednarmaros341/napmap-ufe
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "32M"
              cpu: "0.1"
            limits:
              memory: "320M"
              cpu: "0.3"
